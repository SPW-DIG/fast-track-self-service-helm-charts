imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/camptocamp/datafeeder/datafeeder-python-backend
    pullPolicy: Always
    tag: latest
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      memory: 512Mi
  podSecurityContext:
    runAsUser: 10000
    runAsGroup: 10001
    fsGroup: 10001
  securityContext:
    runAsUser: 10000
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  lifecycle: {}
  extraVolumes: []
  extraVolumeMounts: []
  extraEnv: {}
  ingress:
    enabled: true
    className: "nginx"
    annotations: {}
    hosts:
      - host: "georchestra-127-0-1-1.nip.io"
    # tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local
  # In production, need to use the database where geOrchestra is installed.
  # Configure the existingSecret to geOrchestra database if using geOrchestra helm chart
  # Or configure to the external PostgreSQL host with georchestra database
  # You also need to configure an external database for Airflow, otherwise it uses
  # the internal PostgreSQL database.
  database:
    existingSecret: "georchestra-database-georchestra-secret"
  data_db:
    existingSecret: "datafeeder-python-database-backend"
  datadir:
    git:
      url: https://github.com/georchestra/datadir.git
      ref: "25.0"
      ssh_secret: ""

  config:
    dataPublicUrl: https://georchestra-127-0-0-1.nip.io/geoserver
    metadataPublicUrl: https://georchestra-127-0-0-1.nip.io/geonetwork
    secretKey: change-me
    encryptionKey: change-me
    frontend:
      # Change to your domain with subpath /datafeeder
      url: https://georchestra-127-0-1-1.nip.io/datafeeder
    corsOrigins: http://localhost:5173
    console:
      # optional, default to georchestra-console-svc (work if helm chart geOrchestra installed)
      url: ""
    geoserver:
      # optional, default to georchestra-geoserver-svc (work if helm chart geOrchestra installed)
      username: testadmin
      password: testadmin
    geonetwork:
      # optional, default to georchestra-geonetwork-svc (work if helm chart geOrchestra installed)
      username: testadmin
      password: testadmin
    airflow:
      # optional, default to airflow api-server in the same helm chart
      username: admin
      password: admin

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/camptocamp/datafeeder/datafeeder-python-frontend
    pullPolicy: Always
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      memory: 128Mi
  podSecurityContext:
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
  securityContext:
    runAsUser: 101
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  lifecycle: {}
  extraVolumes: []
  extraVolumeMounts: []
  extraEnv: []
  ingress:
    enabled: true
    className: "nginx"
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: "georchestra-127-0-1-1.nip.io"
    # tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

tooling:
  # Global image used for toolbox: chmod + git clone
  general:
    image:
      repository: alpine/git
      tag: 2.49.1

# Airflow helm chart. Doc here: https://airflow.apache.org/docs/helm-chart/stable/index.html
airflow:
  enabled: true

  env:
    - name: AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION
      value: "False"

  redis:
    # To change
    password: ~
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  statsd:
    enabled: false

  images:
    airflow:
      repository: ghcr.io/camptocamp/datafeeder/datafeeder-python-airflow
      tag: latest
      pullPolicy: Always  # Set to Always while it's latest

  data:
    metadataConnection:
      protocol: postgresql
      user: georchestra
      pass: georchestra

  # To change
  jwtSecret: "georchestra-datafeeder-jwt-secret"
  fernetKey: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="

  # Configure Airflow to run behind a subpath
  config:
    api:
      base_url: /airflow
    webserver:
      base_url: /airflow

  triggerer:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

  scheduler:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 1Gi

  apiServer:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 1Gi

  dagProcessor:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 1Gi

  workers:
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 5Gi
    celery:
      persistence:
        enabled: true

  logs:
    emptyDirConfig:
      sizeLimit: 1Gi
      medium: Memory

  postgresql:
  # Uncomment when using external PostgreSQL, highly recommended for production
  #  enabled: false
    image:  # section of parameters for builtin database
      registry: ghcr.io
      repository: camptocamp/datafeeder/datafeeder-python-database
      tag: latest
    auth:
      database: georchestra
      # If using an existing secret: this one will both be used by the bitnami chart managing the DB
      # and by the georchestra db secret
      # (https://github.com/georchestra/helm-charts/blob/main/georchestra/templates/database/database-georchestra-secret.yaml)
      # that is used by the apps
      # So you must be quite careful. It should follow the pattern from the previsouly mentioned secret
      # and tell the bitnami chart which variable provide the user and password
      # And the `database`, `username` and `ssl` params still have to be defined here and match the ones
      # provided by the secret
      # existingSecret: mysecret
      # secretKeys:
      #   adminPasswordKey: postgresPassword
      #   userPasswordKey: password # This one should stay as it is
  #   host: georchestra
      password: georchestra
      postgresPassword: georchestra
      port: "5432"
      ssl: false
      username: georchestra
    primary:  # section of parameters for builtin database
      startupProbe:
        enabled: true
      containerSecurityContext:
        readOnlyRootFilesystem: false
      persistentVolumeClaimRetentionPolicy:
        enabled: true
      initdb:
        username: georchestra
        password: georchestra
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 512Mi

  # When using specific external secret
  # See https://airflow.apache.org/docs/helm-chart/stable/production-guide.html#built-in-secrets-and-environment-variables
  # secret:
  #   - envName: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
  #     secretName: db-credentials-int-airflow
  #     secretKey: conn
  # enableBuiltInSecretEnvVars:
  #   AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: false

  # for ArgoCD
  # https://airflow.apache.org/docs/helm-chart/stable/index.html#installing-the-chart-with-argo-cd-flux-rancher-or-terraform
  # createUserJob:
  #   useHelmHooks: false
  # migrateDatabaseJob:
  #   useHelmHooks: false
  #   jobAnnotations:
  #     "argocd.argoproj.io/hook": Sync

airflowDbCleanup:
  enabled: true
  # Run on the 1st of every month at midnight
  schedule: "0 0 1 * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  # Secret created by the Airflow subchart containing the metadata DB connection URL.
  # Defaults to "{release-name}-metadata" if not set.
  connectionSecretName: ""
  connectionSecretKey: connection
  # Override the full command to customise the retention period or any other argument.
  command:
    - /bin/bash
    - -c
    - >-
      airflow db clean
      --clean-before-timestamp=$(date -d '1 year ago' +%Y-%m-%dT%H:%M:%S+00:00)
      -y
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

volumes:
  storage_class_name: default
  airflow_logs:
    # pv_name: datafeeder-airflow-logs
    size: 10Gi
