{{- $webapp := .Values.georchestra.webapps.datahub -}}
{{- if $webapp.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "georchestra.fullname" . }}-datahub-svc
  labels:
    {{- include "georchestra.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "georchestra.fullname" . }}-datahub
  {{- with $webapp.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
  selector:
    org.georchestra.service/name: {{ include "georchestra.fullname" . }}-datahub
{{- end }}
